const C={bg:'#06090F',sur:'#0C1220',card:'#101828',brd:'#182030',brdHi:'#1E2E48',grn:'#00D97E',red:'#F04060',amb:'#F5A623',blu:'#4A9EFF',txt:'#DCE8F8',mut:'#3D5068',dim:'#7A90A8',sub:'#141E2E'};

// ── DATA ─────────────────────────────────────────────────────────
function makeDailyData(ytd,days,seed){
  const N=110,pa=N-days,pk=ytd*(1.45+seed*0.08);
  const cum=Array.from({length:N},(_,i)=>{
    if(i<pa){const t=i/pa,ns=Math.sin(i*seed*1.3)*pk*0.04;return Math.round(pk*(t+ns/pk));}
    const t=(i-pa)/days,ns=Math.sin(i*seed*0.9)*Math.abs(pk-ytd)*0.02;
    return Math.round(pk+(ytd-pk)*t+ns);
  });
  cum[N-1]=ytd;
  const ml={0:'Jan',18:'Feb',37:'Mar',56:'Apr',74:'May',92:'Jun'};
  return cum.map((pnl,i)=>{
    const s=Math.max(0,i-29),sl=cum.slice(s,i+1),ma=Math.round(sl.reduce((a,b)=>a+b,0)/sl.length);
    return{i,lbl:ml[i]||'',pnl,ma};
  });
}

const pnlCurve=[0,142000,98000,370000,310000,540000,680000,790000,842000];
const pnlLabels=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00'];

// ── HELPERS ──────────────────────────────────────────────────────
const fmt=n=>{const a=Math.abs(n),s=n<0?'−':'+';return a>=1e6?`${s}$${(a/1e6).toFixed(2)}M`:a>=1000?`${s}$${(a/1000).toFixed(0)}K`:`${s}$${a}`;};
const fv=n=>n>=1000?`${(n/1000).toFixed(0)}K`:`${n}`;
const gc=n=>n>=0?C.grn:C.red;
const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});
  children.forEach(c=>c!=null&&c!==false&&e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
};
const svg=(tag,attrs={},children=[])=>{
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  children.forEach(c=>c&&e.appendChild(c));
  return e;
};

// ── SVG CHARTS ───────────────────────────────────────────────────
function sparkline(data,w,h,color){
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(((v-mn)/rng)*(h-4)+2)}`).join(' ');
  const area=`M0,${h} L${pts.split(' ').map((p,i)=>i===0?`0,${h} L${p}`:p).join(' ')} L${w},${h} Z`;
  const g=svg('svg',{width:w,height:h,viewBox:`0 0 ${w} ${h}`},[
    svg('defs',{},[svg('linearGradient',{id:'sg',x1:'0',y1:'0',x2:'0',y2:'1'},[svg('stop',{offset:'0%','stop-color':color,'stop-opacity':'0.3'}),svg('stop',{offset:'100%','stop-color':color,'stop-opacity':'0'})])]),
    svg('path',{d:`M${pts.split(' ').map((p,i)=>i===0?`M${p}`:` L${p}`).join('')} L${w},${h} L0,${h} Z`,fill:'url(#sg)',stroke:'none'}),
    svg('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':'1.5'}),
  ]);
  return g;
}

function lineChart(data,w,h,series){
  const allVals=series.flatMap(s=>data.map(d=>d[s.key]));
  const mn=Math.min(...allVals),mx=Math.max(...allVals),rng=mx-mn||1;
  const px=(v,i)=>`${(i/(data.length-1))*(w-40)+10},${(h-20)-(((v-mn)/rng)*(h-30))+4}`;
  const months=data.filter(d=>d.lbl).map(d=>d);
  const g=svg('svg',{width:w,height:h,viewBox:`0 0 ${w} ${h}`},[
    svg('line',{x1:10,y1:4,x2:10,y2:h-16,stroke:C.brd}),
    svg('line',{x1:10,y1:h-16,x2:w-10,y2:h-16,stroke:C.brd}),
    ...months.map(d=>{const x=(d.i/(data.length-1))*(w-40)+10;return svg('text',{x,y:h-3,'text-anchor':'middle',fill:C.mut,'font-size':'9'},[])[Symbol.for('text')]=d.lbl,svg('text',{x,y:h-3,'text-anchor':'middle',fill:C.mut,'font-size':'9'});}),
    ...series.map(s=>{
      const pts=data.map((d,i)=>px(d[s.key],i)).join(' ');
      return svg('polyline',{points:pts,fill:'none',stroke:s.color,'stroke-width':s.width||2,...(s.dash?{'stroke-dasharray':'5,3'}:{})});
    }),
    ...months.map(d=>{const x=(d.i/(data.length-1))*(w-40)+10;const t=svg('text',{x,y:h-3,'text-anchor':'middle',fill:C.mut,'font-size':'9'});t.textContent=d.lbl;return t;}),
    ...([mn,0,(mn+mx)/2,mx].filter((v,i,a)=>a.indexOf(v)===i)).map(v=>{const y=(h-20)-(((v-mn)/rng)*(h-30))+4;const t=svg('text',{x:8,y:y+3,'text-anchor':'end',fill:C.mut,'font-size':'8'});t.textContent=fmt(v);return t;}),
  ]);
  return g;
}

// ── UI COMPONENTS ────────────────────────────────────────────────
function card(children,style={},onClick){
  const c=el('div',{style:{background:C.card,border:`1px solid ${C.brd}`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',...style}},children);
  if(onClick){c.style.cursor='pointer';c.addEventListener('click',onClick);}
  return c;
}
function tag(label,color=C.mut){return el('span',{style:{background:color+'20',color,borderRadius:'5px',padding:'1px 7px',fontSize:'9px',fontWeight:'700',whiteSpace:'nowrap'}},[""+label]);}
function hdr(txt,accent=C.blu){return el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px',flexShrink:'0'}},[el('div',{style:{width:'3px',height:'12px',background:accent,borderRadius:'2px'}}),el('span',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'0.1em',color:C.mut}},[txt])]);}
function tog(opts,val,onChange){
  const wrap=el('div',{style:{display:'flex',background:C.sur,borderRadius:'7px',padding:'2px',gap:'2px'}});
  opts.forEach(o=>{
    const b=el('button',{style:{background:val===o?C.sub:'transparent',color:val===o?C.txt:C.mut,border:'none',borderRadius:'5px',padding:'3px 9px',fontSize:'9px',fontWeight:'700',whiteSpace:'nowrap'}},[o]);
    b.addEventListener('click',()=>onChange(o));
    wrap.appendChild(b);
  });
  return wrap;
}
function bar(pct){
  const c=pct>=90?C.red:pct>=70?C.amb:C.grn;
  return el('div',{style:{display:'flex',flexDirection:'column',gap:'3px'}},[
    el('div',{style:{display:'flex',justifyContent:'space-between'}},[el('span',{style:{fontSize:'9px',color:C.dim}},[`${pct.toFixed(0)}% used`]),el('span',{style:{fontSize:'9px',fontWeight:'700',color:c}},[pct>=90?'CRITICAL':pct>=70?'CAUTION':'—'])]),
    el('div',{style:{background:C.sub,borderRadius:'99px',height:'4px'}},[el('div',{style:{width:`${Math.min(pct,100)}%`,background:c,borderRadius:'99px',height:'4px'}})]),
  ]);
}

  // Hard Stop
  const stopRows=stops.map(t=>{const pct=Math.abs(t.l)/Math.abs(t.lim)*100;const r=el('div',{style:{background:C.sur,borderRadius:'8px',padding:'9px 11px',border:`1px solid ${pct>=90?C.red+'40':C.brd}`,marginBottom:'7px'}});r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},[el('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},[el('span',{style:{fontSize:'14px',fontWeight:'700',color:C.txt}},[t.n]),tag(t.b)]),el('span',{style:{fontSize:'14px',fontWeight:'700',color:C.red}},[fmt(t.l)])]));r.appendChild(bar(pct));r.appendChild(el('div',{style:{fontSize:'9px',color:C.mut,marginTop:'5px'}},[`Limit: ${fmt(t.lim)}  ·  Primary: `,el('span',{style:{color:C.amb,fontWeight:'700'}},[t.m])]));return r;});
  grid.appendChild(card([hdr('NEAR HARD STOP',C.red),...stopRows],{minHeight:'0',borderColor:C.red+'40'}));

  // Below MA
  const bmaRows=bMA.map(t=>{const pb=t.ma>0?((t.ma-t.ytd)/t.ma*100).toFixed(0):0;const r=el('div',{style:{background:C.sur,borderRadius:'8px',padding:'9px 11px',border:`1px solid ${C.brd}`,cursor:'pointer',marginBottom:'7px'}});r.addEventListener('mouseenter',()=>r.style.borderColor=C.amb+'60');r.addEventListener('mouseleave',()=>r.style.borderColor=C.brd);r.addEventListener('click',()=>setState({tModal:t}));r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}},[el('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},[el('span',{style:{fontSize:'14px',fontWeight:'700',color:C.txt}},[t.n]),tag(t.b)]),el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},[el('span',{style:{fontSize:'9px',color:C.amb}},[`−${pb}% · ${t.d}d`]),el('span',{style:{fontSize:'11px',color:C.amb}},['↗'])])]));r.appendChild(el('div',{style:{display:'flex',gap:'20px'}},[el('div',null,[el('div',{style:{fontSize:'8px',color:C.mut,marginBottom:'1px'}},['YTD P&L']),el('div',{style:{fontSize:'12px',fontWeight:'600',color:C.red}},[fmt(t.ytd)])]),el('div',null,[el('div',{style:{fontSize:'8px',color:C.mut,marginBottom:'1px'}},['30d Avg']),el('div',{style:{fontSize:'12px',color:C.dim}},[fmt(t.ma)])])]));return r;});
  grid.appendChild(card([hdr('P&L BELOW 30-DAY AVG',C.amb),el('div',{style:{fontSize:'8px',color:C.mut,marginBottom:'8px',flexShrink:'0'}},['↗ Click trader to view YTD chart']),...bmaRows],{minHeight:'0',borderColor:C.amb+'40'}));

  // VAR
  const varCard=card([hdr('VAR ALERTS — ACTIVE TRADERS',C.amb)],{minHeight:'0'});
  const varGrid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',flex:'1',minHeight:'0'}});
  [{k:'hi',l:'HIGH >150%',i:'↑',c:C.red},{k:'lo',l:'LOW <50%',i:'↓',c:C.mut}].forEach(side=>{
    const col=el('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}});
    col.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}},[el('span',{style:{fontSize:'8px',fontWeight:'700',color:side.c}},[`${side.i} ${side.l}`]),tag(varA[side.k].length,side.c)]));
    varA[side.k].forEach(t=>{const r=el('div',{style:{background:C.sur,borderRadius:'7px',padding:'7px 10px',border:`1px solid ${C.brd}`}});r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between'}},[el('span',{style:{fontSize:'13px',fontWeight:'700',color:C.txt}},[t.n]),el('span',{style:{fontSize:'11px',fontWeight:'700',color:side.c}},[(t.v/t.a*100).toFixed(0)+'%'])]));r.appendChild(el('div',{style:{fontSize:'9px',color:C.dim,marginTop:'2px'}},[`${fmt(t.v)} vs ${fmt(t.a)}`]));col.appendChild(r);});
    varGrid.appendChild(col);
  });
  varCard.appendChild(varGrid);
  grid.appendChild(varCard);

  // Blocked
  const blkRows=blk.map(c=>{const r=el('div',{style:{background:C.sur,borderRadius:'8px',padding:'9px 11px',border:`1px solid ${c.t.length?C.red+'40':C.brd}`,marginBottom:'7px'}});r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:c.t.length?'6px':'0'}},[el('span',{style:{fontSize:'13px',fontWeight:'700',color:c.t.length?C.red:C.txt}},[c.c]),el('span',{style:{fontSize:'9px',color:C.dim}},[`exp. ${c.e}`])]));if(c.t.length){const tw=el('div',{style:{display:'flex',gap:'5px'}});c.t.forEach(t=>tw.appendChild(tag(t,C.red)));r.appendChild(tw);}else r.appendChild(el('div',{style:{fontSize:'9px',color:C.mut}},['No exposed traders']));return r;});
  const exposedCount=blk.filter(c=>c.t.length).length;
  grid.appendChild(card([el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexShrink:'0',marginBottom:'10px'}},[hdr('BLOCKED CONTRACTS',C.red),tag(`${exposedCount} exposed`,C.red)]),...blkRows],{minHeight:'0',borderColor:C.red+'40'}));

  root.appendChild(grid);
  app.appendChild(root);

  if(state.modal)app.appendChild(pnlModal());
  if(state.tModal)app.appendChild(traderModal(state.tModal));
}

render();
setInterval(()=>{
  const t=document.querySelector('[data-clock]');
  if(t)t.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
},30000);
</script>
</body>
</html>
