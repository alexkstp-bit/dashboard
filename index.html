<body>

<script src="https://cdn.jsdelivr.net/npm/react@18.1.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.1.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/umd/Recharts.js"></script>

<script>
window.addEventListener('load', function() {
  try {
    document.getElementById('loading').style.display = 'none';

    const {createElement:h, useState, Fragment} = React;
    const {AreaChart,Area,LineChart,Line,XAxis,YAxis,Tooltip,ResponsiveContainer,ReferenceLine,CartesianGrid} = Recharts;

    const C={bg:'#06090F',surface:'#0C1220',card:'#101828',border:'#182030',borderHi:'#1E2E48',green:'#00D97E',red:'#F04060',amber:'#F5A623',blue:'#4A9EFF',text:'#DCE8F8',muted:'#3D5068',dim:'#7A90A8',subtle:'#141E2E'};

    function makeDailyData(ytdFinal,daysBelow,seed){
      const N=110,peakAt=N-daysBelow,peak=ytdFinal*(1.45+seed*0.08);
      const cum=Array.from({length:N},(_,i)=>{
        if(i<peakAt){const t=i/peakAt,noise=Math.sin(i*seed*1.3)*peak*0.04;return Math.round(peak*(t+noise/peak));}
        const t=(i-peakAt)/daysBelow,noise=Math.sin(i*seed*0.9)*Math.abs(peak-ytdFinal)*0.02;
        return Math.round(peak+(ytdFinal-peak)*t+noise);
      });
      cum[N-1]=ytdFinal;
      const ml={0:'Jan',18:'Feb',37:'Mar',56:'Apr',74:'May',92:'Jun'};
      return cum.map((pnl,i)=>{
        const s=Math.max(0,i-29),sl=cum.slice(s,i+1),ma=Math.round(sl.reduce((a,b)=>a+b,0)/sl.length);
        return{i,label:ml[i]||'',pnl,ma};
      });
    }

    const pnlCurve=[{t:'08:00',p:0},{t:'09:00',p:142000},{t:'10:00',p:98000},{t:'11:00',p:370000},{t:'12:00',p:310000},{t:'13:00',p:540000},{t:'14:00',p:680000},{t:'15:00',p:790000},{t:'16:00',p:842000}];

    const allProd=[

      {name:'RB',pnl:28700,vol:4320},{name:'PA',pnl:12400,vol:1230},{name:'PL',pnl:8900,vol:980},

            h('div',{style:{display:'flex',alignItems:'center',gap:7}},h('div',{style:{width:20,borderTop:`2px dashed ${C.amber}`}}),h('span',{style:{fontSize:10,color:C.dim}},'30-day moving average'))

              h(ReferenceLine,{y:0,stroke:C.muted,strokeDasharray:'3 3'}),

            )

      const [modal,setModal]=useState(false);

      const [pv,setPv]=useState('Top 5');
      const [tv,setTv]=useState('Top 5');
      const prods=pv==='Top 5'?topP:pv==='Btm 5'?botP:allProd;
      const trdrs=tv==='Top 5'?topT:tv==='Btm 5'?botT:[...allTrd].sort((a,b)=>b.pnl-a.pnl);
      const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const today=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

      return h('div',{style:{background:C.bg,height:'100vh',width:'100vw',display:'flex',flexDirection:'column',color:C.text,padding:'8px 12px',boxSizing:'border-box',gap:7,overflow:'hidden'}},

        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}},

            )
          ),

          h(Card,{style:{minHeight:0}},
            h(Hdr,{txt:'VAR ALERTS — ACTIVE TRADERS',accent:C.amber}),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,flex:1,minHeight:0}},
              [{key:'high',label:'HIGH >150%',icon:'↑',c:C.red},{key:'low',label:'LOW <50%',icon:'↓',c:C.muted}].map(side=>
                h('div',{key:side.key,style:{display:'flex',flexDirection:'column',gap:5}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},h('span',{style:{fontSize:8,fontWeight:700,color:side.c}},`${side.icon} ${side.label}`),h(Tag,{label:varA[side.key].length,color:side.c})),
                  varA[side.key].map((t,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:7,padding:'7px 10px',border:`1px solid ${C.border}`}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},t.name),h('span',{style:{fontSize:11,fontWeight:700,color:side.c}},`${(t.v/t.avg*100).toFixed(0)}%`)),h('div',{style:{fontSize:9,color:C.dim,marginTop:2}},`${fmt(t.v)} vs ${fmt(t.avg)}`)))
                )
              )
            )
          ),

          h(Card,{style:{minHeight:0,borderColor:`${C.red}40`}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0,marginBottom:10}},h(Hdr,{txt:'BLOCKED CONTRACTS',accent:C.red}),h(Tag,{label:`${blk.filter(c=>c.traders.length).length} exposed`,color:C.red})),
            h('div',{style:{display:'flex',flexDirection:'column',gap:7,flex:1}},
              blk.map((c,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:8,padding:'9px 11px',border:`1px solid ${c.traders.length?`${C.red}40`:C.border}`}},
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:c.traders.length?6:0}},h('span',{style:{fontSize:13,fontWeight:700,color:c.traders.length?C.red:C.text}},c.contract),h('span',{style:{fontSize:9,color:C.dim}},`exp. ${c.expiry}`)),
                c.traders.length?h('div',{style:{display:'flex',gap:5}},c.traders.map((t,j)=>h(Tag,{key:j,label:t,color:C.red}))):h('div',{style:{fontSize:9,color:C.muted}},'No exposed traders')
              ))
            )
          )
        ),

        modal&&h(PnLModal,{close:()=>setModal(false)}),
        tModal&&h(TraderModal,{trader:tModal,close:()=>setTModal(null)})
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(Dashboard,null));

  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('root').innerHTML=`<div style="padding:40px;color:#FF4560;font-family:monospace"><h2>Error loading dashboard</h2><pre style="margin-top:16px;font-size:12px;color:#7A90A8">${err.message}\n${err.stack}</pre></div>`;
  }
});
</script>
</body>
</html>
