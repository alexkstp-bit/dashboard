function makeDailyData(ytdFinal,daysBelow,seed){
  const N=110,peakAt=N-daysBelow,peak=ytdFinal*(1.45+seed*0.08);
  const cum=Array.from({length:N},(_,i)=>{
    if(i<peakAt){const t=i/peakAt,noise=Math.sin(i*seed*1.3)*peak*0.04;return Math.round(peak*(t+noise/peak));}
    else{const t=(i-peakAt)/daysBelow,noise=Math.sin(i*seed*0.9)*Math.abs(peak-ytdFinal)*0.02;return Math.round(peak+(ytdFinal-peak)*t+noise);}
  });
  cum[N-1]=ytdFinal;
  const ml={0:'Jan',18:'Feb',37:'Mar',56:'Apr',74:'May',92:'Jun'};
  return cum.map((pnl,i)=>{
    const s=Math.max(0,i-29),sl=cum.slice(s,i+1),ma=Math.round(sl.reduce((a,b)=>a+b,0)/sl.length);
    return{i,label:ml[i]||'',pnl,ma};
  });
}

              d('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}},
                d('div',{style:{display:'flex',alignItems:'center',gap:7}},d('span',{style:{fontSize:14,fontWeight:700,color:C.text}},t.name),d(Tag,{label:t.batch,color:C.muted})),
                d('div',{style:{display:'flex',alignItems:'center',gap:8}},d('span',{style:{fontSize:9,color:C.amber}},`‚àí${pb}% ¬∑ ${t.days}d`),d('span',{style:{fontSize:11,color:C.amber}},'‚Üó'))
              ),
              d('div',{style:{display:'flex',gap:20}},
                d('div',null,d('div',{style:{fontSize:8,color:C.muted,marginBottom:1}},'YTD P&L'),d('div',{style:{fontSize:12,fontWeight:600,color:C.red}},fmt(t.ytd))),
                d('div',null,d('div',{style:{fontSize:8,color:C.muted,marginBottom:1}},'30d Avg'),d('div',{style:{fontSize:12,color:C.dim}},fmt(t.ma)))
              )
            );
          })
        )
      ),

      // VAR
      d(Card,{style:{minHeight:0}},
        d(Hdr,{txt:'VAR ALERTS ‚Äî ACTIVE TRADERS',accent:C.amber}),
        d('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,flex:1,minHeight:0}},
          [{key:'high',label:'HIGH >150%',icon:'‚Üë',c:C.red},{key:'low',label:'LOW <50%',icon:'‚Üì',c:C.muted}].map(side=>
            d('div',{key:side.key,style:{display:'flex',flexDirection:'column',gap:5}},
              d('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},d('span',{style:{fontSize:8,fontWeight:700,color:side.c,letterSpacing:'0.08em'}},`${side.icon} ${side.label}`),d(Tag,{label:varAlerts[side.key].length,color:side.c})),
              varAlerts[side.key].map((t,i)=>{
                const pct=(t.v/t.avg*100).toFixed(0);
                return d('div',{key:i,style:{background:C.surface,borderRadius:7,padding:'7px 10px',border:`1px solid ${C.border}`}},
                  d('div',{style:{display:'flex',justifyContent:'space-between'}},d('span',{style:{fontSize:13,fontWeight:700,color:C.text}},t.name),d('span',{style:{fontSize:11,fontWeight:700,color:side.c}},`${pct}%`)),
                  d('div',{style:{fontSize:9,color:C.dim,marginTop:2}},`${fmt(t.v)} vs ${fmt(t.avg)}`)
                );
              })
            )
          )
        )
      ),

      // BLOCKED
      d(Card,{style:{minHeight:0,borderColor:`${C.red}40`}},
        d('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0,marginBottom:10}},d(Hdr,{txt:'BLOCKED CONTRACTS',accent:C.red}),d(Tag,{label:`${blocks.filter(c=>c.traders.length).length} exposed`,color:C.red})),
        d('div',{style:{display:'flex',flexDirection:'column',gap:7,flex:1}},
          blocks.map((c,i)=>d('div',{key:i,style:{background:C.surface,borderRadius:8,padding:'9px 11px',border:`1px solid ${c.traders.length?`${C.red}40`:C.border}`}},
            d('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:c.traders.length?6:0}},d('span',{style:{fontSize:13,fontWeight:700,color:c.traders.length?C.red:C.text}},c.contract),d('span',{style:{fontSize:9,color:C.dim}},`exp. ${c.expiry}`)),
            c.traders.length?d('div',{style:{display:'flex',gap:5,flexWrap:'wrap'}},c.traders.map((t,j)=>d(Tag,{key:j,label:t,color:C.red}))):d('div',{style:{fontSize:9,color:C.muted}},'No exposed traders')
          ))
        )
      )
    ),

    modal&&d(PnLModal,{close:()=>setModal(false)}),
    traderModal&&d(TraderChartModal,{trader:traderModal,close:()=>setTraderModal(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Dashboard,null));
</script>
</body>
</html>
